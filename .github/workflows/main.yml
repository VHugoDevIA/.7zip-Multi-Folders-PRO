name: Teste Manual PowerShell

on:
  workflow_dispatch:

jobs:
  testar:
    runs-on: windows-latest

    steps:
      - name: Ir buscar o código
        uses: actions/checkout@v4

      - name: Mostrar versão do PowerShell
        shell: pwsh
        run: $PSVersionTable

      - name: Verificar sintaxe do script
        shell: pwsh
        run: |
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content .\zip_multiplas_pastas_pro_v6_1_2.ps1 -Raw), [ref]$null)
          Write-Host "Sintaxe OK"

      - name: Teste simples
        shell: pwsh
        run: |
          Write-Host "Teste manual executado com sucesso"
